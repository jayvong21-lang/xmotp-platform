{% extends "base.html" %}
{% block content %}
<div class="login-box">
    <h1>xm<b>OTP</b></h1>
    <p class="sub">One True Place · 每个客户只匹配最适合的那一间</p>
    <form method="post">
        {% if error %}<div class="msg-error">{{ error }}</div>{% endif %}
        <label>用户名</label>
        <input name="username" placeholder="admin" required autofocus>
        <label>密码</label>
        <input name="password" type="password" placeholder="••••••" required>
        <button type="submit">登 录</button>
    </form>
</div>
{% endblock %}
